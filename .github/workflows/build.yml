name: HTML CI Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML files
        run: |
          docker run --rm -v ${{ github.workspace }}:/work ghcr.io/validator/validator:latest \
          java -jar /vnu.jar /work --skip-non-html --errors-only

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress ./**/*.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}